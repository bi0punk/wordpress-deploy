user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 64m;
    server_tokens off;
    port_in_redirect off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
      text/plain
      text/css
      text/xml
      text/javascript
      application/json
      application/javascript
      application/xml+rss
      application/xml
      image/svg+xml;

    upstream wordpress_upstream {
        server wordpress:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.php index.html;
        autoindex off;

        access_log /var/log/nginx/wordpress_access.log main;
        error_log /var/log/nginx/wordpress_error.log warn;

        # Archivos estáticos desde nginx; si no existen, se delega a WordPress/Apache.
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot|otf|mp4|webm)$ {
            expires 7d;
            access_log off;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri @wordpress;
        }

        # OJO: no usar try_files $uri $uri/ aquí, porque para "/" NGINX detecta el directorio
        # raíz y responde 403 al no ejecutar index.php. Todo lo dinámico debe ir al upstream.
        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://wordpress_upstream;
            proxy_redirect off;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300;
            proxy_connect_timeout 60;
        }

        location @wordpress {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://wordpress_upstream;
            proxy_redirect off;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300;
            proxy_connect_timeout 60;
        }
    }
}
