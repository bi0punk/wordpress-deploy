# bind 0.0.0.0: Redis escucha en todas las interfaces del contenedor.
# La aislación del host la da la red interna de Docker (sin `ports:` publicado)
# más el requirepass de abajo. NO usar 127.0.0.1 aquí: dentro de un contenedor
# solo escucharía el loopback del propio contenedor y WordPress (otro contenedor)
# no podría conectarse a `redis:6379`.
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 60
databases 1
appendonly yes
appendfsync everysec
dir /data
maxmemory 256mb
maxmemory-policy allkeys-lru
requirepass ${REDIS_PASSWORD:-changeme}
